<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Edytor v1.29 - Widok Excela i Duplikowanie</title>
    <style>
        :root { --primary: #0056b3; --success: #28a745; --danger: #d63031; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .admin-header { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .entry-card { border: 2px solid #dee2e6; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #fff; position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        
        .days-selector { display: flex; gap: 4px; margin-top: 5px; }
        .day-btn { padding: 6px 10px; border: 1px solid #ccc; background: #fff; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .day-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .pociagi-zone { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-top: 10px; border: 1px dotted #ccc; }
        .p-row { display: flex; gap: 8px; margin-bottom: 5px; }
        
        /* WIDOK EXCELA */
        .excel-view { margin-top: 40px; border-top: 3px solid var(--primary); padding-top: 20px; }
        .excel-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        .excel-table th { background: #343a40; color: #fff; padding: 10px; text-align: left; }
        .excel-table td { border: 1px solid #dee2e6; padding: 8px; }
        .excel-table tr:nth-child(even) { background: #f8f9fa; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #fff; }
        .btn-copy { background: #6c757d; font-size: 11px; padding: 4px 8px; }
        .btn-del { background: var(--danger); font-size: 11px; padding: 4px 8px; }
        
        input, select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        .footer-info { margin-top: 20px; font-size: 11px; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-header">
        <div>
            <h2 style="margin:0">🚂 Kreator Bazy v1.29</h2>
            <p style="margin:5px 0 0 0; font-size:12px; color:#666;">Zarządzaj służbami i pociągami</p>
        </div>
        <div>
            <label><b>Data wydania harmonogramu:</b></label><br>
            <input type="date" id="adminDate" style="font-size:16px; font-weight:bold;">
        </div>
    </div>

    <div id="formList"></div>
    
    <div style="display:flex; gap:10px;">
        <button class="btn" style="background:var(--success); flex:1;" onclick="addEntry()">+ DODAJ NOWĄ SŁUŻBĘ</button>
        <button class="btn" style="background:var(--primary); flex:1;" onclick="exportJSON()">💾 EKSPORTUJ PLIK .JSON</button>
    </div>

    <div class="excel-view">
        <h3 style="margin:0">📊 Podgląd Tabelaryczny (A'la Excel)</h3>
        <table class="excel-table">
            <thead>
                <tr>
                    <th>Kod</th>
                    <th>Start</th>
                    <th>Dni kursowania</th>
                    <th>Zakres</th>
                    <th>Pociągi</th>
                    <th>Akcje</th>
                </tr>
            </thead>
            <tbody id="excelBody"></tbody>
        </table>
    </div>

    <div class="footer-info">Współautorzy: Piotr M 🚂 & Gemini | Wersja aplikacji: v1.29</div>
</div>

<script>
    let dbData = [];

    function addEntry(data = null) {
        const id = Date.now() + Math.random();
        const entry = {
            id: id,
            kod: data ? data.kod : "",
            miejsce: data ? data.miejsce : "",
            from: data ? data.from : "",
            until: data ? data.until : "",
            days: data ? data.days : [1,2,3,4,5],
            pociagi: data ? JSON.parse(JSON.stringify(data.pociagi)) : []
        };
        
        renderEntryCard(entry);
        updateExcel();
    }

    function renderEntryCard(e) {
        const div = document.createElement('div');
        div.className = 'entry-card';
        div.id = `card-${e.id}`;
        div.innerHTML = `
            <button class="btn btn-del" style="float:right" onclick="removeEntry('${e.id}')">USUŃ</button>
            <h3>Służba: <input type="text" value="${e.kod}" placeholder="KOD" oninput="updateVal('${e.id}', 'kod', this.value)"></h3>
            <div class="grid">
                <div>
                    <label>Miejsce startu:</label><br>
                    <input type="text" value="${e.miejsce}" style="width:90%" oninput="updateVal('${e.id}', 'miejsce', this.value)">
                </div>
                <div>
                    <label>Obowiązuje od - do:</label><br>
                    <input type="date" value="${e.from}" oninput="updateVal('${e.id}', 'from', this.value)">
                    <input type="date" value="${e.until}" oninput="updateVal('${e.id}', 'until', this.value)">
                </div>
                <div>
                    <label>Dni tygodnia:</label>
                    <div class="days-selector">
                        ${['Nd','Pn','Wt','Śr','Cz','Pt','Sb'].map((n, i) => 
                            `<button class="day-btn ${e.days.includes(i) ? 'active' : ''}" onclick="toggleDay(this, '${e.id}', ${i})">${n}</button>`
                        ).join('')}
                    </div>
                </div>
            </div>
            <div class="pociagi-zone">
                <strong>Lista pociągów:</strong>
                <div id="pocs-${e.id}"></div>
                <button class="btn" style="background:#6c757d; padding:3px 8px; font-size:11px;" onclick="addPociagRow('${e.id}')">+ Dodaj pociąg</button>
            </div>
        `;
        document.getElementById('formList').appendChild(div);
        dbData.push(e);
        e.pociagi.forEach(p => addPociagRow(e.id, p.nr, p.typ));
    }

    function addPociagRow(eId, nr="", typ="PNP") {
        const cont = document.getElementById(`pocs-${eId}`);
        const row = document.createElement('div');
        row.className = 'p-row';
        row.innerHTML = `
            <input type="text" placeholder="Numer" value="${nr}" oninput="syncPociagi('${eId}')">
            <select onchange="syncPociagi('${eId}')">
                <option value="PNP" ${typ==='PNP'?'selected':''}>PNP</option>
                <option value="W" ${typ==='W'?'selected':''}>W</option>
                <option value="L" ${typ==='L'?'selected':''}>L</option>
            </select>
            <button onclick="this.parentElement.remove(); syncPociagi('${eId}')">✖</button>
        `;
        cont.appendChild(row);
        syncPociagi(eId);
    }

    function toggleDay(btn, eId, day) {
        btn.classList.toggle('active');
        const entry = dbData.find(x => x.id == eId);
        if(entry.days.includes(day)) entry.days = entry.days.filter(d => d !== day);
        else entry.days.push(day);
        updateExcel();
    }

    function updateVal(id, field, val) {
        const entry = dbData.find(x => x.id == id);
        entry[field] = val;
        updateExcel();
    }

    function syncPociagi(id) {
        const entry = dbData.find(x => x.id == id);
        const rows = document.getElementById(`pocs-${id}`).querySelectorAll('.p-row');
        entry.pociagi = Array.from(rows).map(r => ({
            nr: r.querySelector('input').value,
            typ: r.querySelector('select').value
        }));
        updateExcel();
    }

    function removeEntry(id) {
        dbData = dbData.filter(x => x.id != id);
        document.getElementById(`card-${id}`).remove();
        updateExcel();
    }

    function duplicate(id) {
        const entry = dbData.find(x => x.id == id);
        addEntry(entry);
    }

    function updateExcel() {
        const body = document.getElementById('excelBody');
        body.innerHTML = "";
        dbData.forEach(e => {
            const tr = document.createElement('tr');
            const dayNames = ['Nd','Pn','Wt','Śr','Cz','Pt','Sb'];
            const activeDays = e.days.sort().map(d => dayNames[d]).join(', ');
            
            tr.innerHTML = `
                <td><b>${e.kod || '---'}</b></td>
                <td>${e.miejsce || '---'}</td>
                <td><small>${activeDays}</small></td>
                <td><small>${e.from} / ${e.until}</small></td>
                <td>${e.pociagi.map(p => `${p.nr}(${p.typ})`).join(', ')}</td>
                <td>
                    <button class="btn btn-copy" onclick="duplicate('${e.id}')">DUPLIKUJ</button>
                </td>
            `;
            body.appendChild(tr);
        });
    }

    function exportJSON() {
        const adminDate = document.getElementById('adminDate').value;
        const finalObj = {
            metadata: { generatedAt: adminDate, version: "1.29" },
            sluzby: {}
        };
        
        dbData.forEach(e => {
            if(!e.kod) return;
            finalObj.sluzby[e.kod] = {
                miejsce_rozpoczecia: e.miejsce,
                validFrom: e.from,
                validUntil: e.until,
                days: e.days,
                pociagi: e.pociagi
            };
        });

        const blob = new Blob([JSON.stringify(finalObj, null, 2)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `szczegoly_sluzb_${adminDate || 'nowy'}.json`;
        a.click();
    }
</script>
</body>
</html>
